<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0"/>
  <title>Flappy Pink </title>
  <link rel="icon" type="image/png" href="assets/favicon.png"/>
  <style>
    :root{
      --rose:#e60073;
      --pink1:#ffb6e9;
      --pink2:#ffc1f3;
      --pink3:#ffe0f7;
      --pink4:#ff99cc;
      --pink5:#ff66b2;
      --pink6:#ff80bf;
      --pink7:#ff4da6;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: ui-rounded, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      background: linear-gradient(to bottom, var(--pink1), var(--pink2), var(--pink3));
      user-select:none;
    }
    .wrap{
      position:relative;
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 680px;
      border-radius: 0;
      box-shadow: 0 10px 30px rgba(230,0,115,0.25);
      overflow:hidden;
      border: none;
      background:#fff0f6;
      margin: 0 auto;
    }
    
    @media (min-width: 500px) {
      .wrap {
        width: 420px;
        height: 680px;
        border-radius: 24px;
        border: 4px solid var(--pink2);
      }
    }
    /* Header removed */
    #msg{
      position:absolute; 
      bottom:60px; 
      left:50%;
      transform:translateX(-50%);
      z-index:3;
      padding:6px 10px;
      background: rgba(255,255,255,0.85);
      border-radius:12px;
      color:var(--rose);
      font-weight:700;
      text-align:center;
      max-width: 90%;
      box-shadow:0 6px 16px rgba(255, 77, 166, .18);
      font-size: 13px;
    }
    canvas{ 
      display:block; 
      width:100%; 
      height:100%; 
      touch-action: none; /* Prevent default touch behaviors */
    }
    .hud{
      position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
      display:flex; gap:10px; z-index:3;
    }
    .btn{
      padding:10px 14px; border-radius:999px; border:none;
      background: linear-gradient(180deg, var(--pink5), var(--pink6));
      color:white; font-weight:800; cursor:pointer; box-shadow: 0 6px 14px rgba(255,102,178,.35);
    }
    .btn:active{ transform: translateY(1px); }
    .note{
      position:absolute; bottom:46px; left:50%; transform:translateX(-50%);
      font-size:12px; color:#a80056; opacity:.8; text-align:center; width:90%;
    }
    #hearts{
      position:absolute; 
      top:10px; 
      left:10px; 
      z-index:3; 
      display:flex; 
      gap:2px;
      background: rgba(255,255,255,0.7);
      padding: 6px 10px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="hearts"></div>
    <div id="msg">Toca o presiona una tecla para volar. ¡Tú puedes!</div>
    <canvas id="game"></canvas>
    <div class="hud">
      <button class="btn" id="btnRestart">Reiniciar</button>
      <button class="btn" id="btnEasy">Modo normal</button>
    </div>
    <div class="note">Tienes 5 corazones. ¡Llega a 50 puntos para ganar! </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    let W, H;
    
    // Hero object - declare early to avoid initialization errors
    const hero = { x: 0, y: 0, r: 0, vy: 0, g: 0.32, jump: -6.0 };
    
    function resizeCanvas() {
      const container = document.querySelector('.wrap');
      const rect = container.getBoundingClientRect();
      
      // Set canvas size to match container
      W = rect.width;
      H = rect.height;
      
      // Set canvas resolution
      canvas.width = W;
      canvas.height = H;
      
      // Ensure crisp rendering
      ctx.imageSmoothingEnabled = false;
      
      // Reinitialize hero position and size if game has started
      if (hero.x > 0) {
        initHero();
      }
    }
    
    // Initial resize
    resizeCanvas();
    
    // Resize on window resize
    window.addEventListener('resize', resizeCanvas);

    // Load assets with error handling
    const bgImg = new Image(); 
    bgImg.src = 'assets/background1.png';
    bgImg.onerror = () => console.log('Background image failed to load, using fallback');
    
    const heroImg = new Image(); heroImg.src = 'assets/hero.png';
    heroImg.onerror = () => console.error('Hero image failed to load');
    
    const heartImg = new Image(); heartImg.src = 'assets/heart.png';
    heartImg.onerror = () => console.error('Heart image failed to load');
    
    const starImg = new Image(); starImg.src = 'assets/star.png';
    starImg.onerror = () => console.error('Star image failed to load');
    
    const sparkleImg = new Image(); sparkleImg.src = 'assets/sparkle.png';
    sparkleImg.onerror = () => console.error('Sparkle image failed to load');
    

    // Audio with error handling
    const starSfx = new Audio('assets/star.wav');
    starSfx.onerror = () => console.warn('Star audio failed to load');
    
    const victorySfx = new Audio('assets/victory.wav');
    victorySfx.onerror = () => console.warn('Victory audio failed to load');
    
    const hurtSfx = new Audio('assets/star.wav');
    hurtSfx.onerror = () => console.warn('Hurt audio failed to load');
    
    // Create audio context for pitch shifting hurt sound
    let audioContext;
    let hurtBuffer;
    
    function playStar(){ try { starSfx.currentTime = 0; starSfx.play(); } catch(e){} }
    function playVictory(){ try { victorySfx.currentTime = 0; victorySfx.play(); } catch(e){} }
    function playHurt(){ 
      try { 
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        // Play a lower pitched, shorter version of the star sound
        const source = audioContext.createBufferSource();
        const gainNode = audioContext.createGain();
        
        // If we have the buffer, use it with pitch shift
        if (hurtBuffer) {
          source.buffer = hurtBuffer;
          source.playbackRate.value = 0.6; // Lower pitch
          gainNode.gain.value = 0.2; // Lower volume
          
          source.connect(gainNode);
          gainNode.connect(audioContext.destination);
          source.start(0, 0, 0.2); // Play only first 0.2 seconds
        } else {
          // Fallback to simple audio with different settings
          hurtSfx.currentTime = 0;
          hurtSfx.volume = 0.2;
          hurtSfx.playbackRate = 0.7;
          hurtSfx.play();
        }
      } catch(e){
        // Fallback
        try {
          hurtSfx.currentTime = 0;
          hurtSfx.volume = 0.2;
          hurtSfx.play();
        } catch(e2){}
      }
    }
    
    function unlockAudio(){ 
      try { 
        starSfx.play().then(() => starSfx.pause()).catch(e => {});
        // Initialize audio context
        if (!audioContext && (window.AudioContext || window.webkitAudioContext)) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
      } catch(e){
        console.warn('Audio initialization failed:', e);
      } 
    }

    const msg = document.getElementById('msg');
    const heartsDiv = document.getElementById('hearts');

    // Helpers to confirm assets are ready
    function isReady(img){ return img && img.complete && img.naturalWidth > 0; }
    
    function updateHeartsDisplay(){
      const fullHearts = Math.floor(lives);
      const hasHalf = (lives % 1) === 0.5;
      let heartsHTML = '';
      
      for (let i = 0; i < fullHearts; i++) {
        heartsHTML += '❤️';
      }
      
      if (hasHalf && fullHearts < 5) {
        heartsHTML += '💔';
      }
      
      heartsDiv.innerHTML = heartsHTML;
    }
    const btnRestart = document.getElementById('btnRestart');
    const btnEasy = document.getElementById('btnEasy');

    let easyMode = false; // Disabled by default with new lives system
    btnEasy.onclick = () => { easyMode = !easyMode; btnEasy.textContent = easyMode ? "Modo amable" : "Modo normal"; message(" Modo " + (easyMode ? "amable" : "normal")); };

    function message(t){ msg.textContent = t; }

    // Hero with responsive positioning and size
    function initHero() {
      hero.x = W * 0.167; // 70/420 ≈ 0.167 - proportional x position
      hero.y = H * 0.294; // 200/680 ≈ 0.294 - proportional y position  
      hero.r = Math.min(W, H) * 0.057; // 24/420 ≈ 0.057 - proportional radius
    }
    
    let pipes = []; // columns with a gap
    let stars = []; // collectibles
    let t = 0;
    let score = 0;     // passing pipes
    let starPoints = 0; // collected stars
    let best = 0;
    let lives = 5.0;   // 5 hearts, loses 0.5 per collision
    let gameWon = false;
    let gameOver = false;
    let gameStarted = false; // Game hasn't started until first input
    let idleT = 0;
    let invincibleFrames = 0;
    let heroFlashFrames = 0;
    let pipeTimer = 0;

    function reset(){
      pipes = [];
      stars = [];
      t = 0;
      score = 0;
      starPoints = 0;
      lives = 5.0;
      gameWon = false;
      gameOver = false;
      gameStarted = false; // Reset game started state
      invincibleFrames = 0;
      heroFlashFrames = 0;
      pipeTimer = 0;
      initHero();
      hero.vy = 0;
      message(" ¡Toca o presiona una tecla para volar! ¡Tú puedes! ");
      updateHeartsDisplay();
    }

    function flap(){ 
      if (gameOver || gameWon) return;
      
      // Start the game on first input
      if (!gameStarted) {
        gameStarted = true;
        message(" ¡Adelante! ¡Tú puedes hacerlo! ");
      }
      
      hero.vy = hero.jump; 
    }

    // Enhanced input handling for mobile and desktop
    function handleInput(e) {
      e.preventDefault();
      unlockAudio();
      flap();
    }
    
    // Touch events for mobile
    canvas.addEventListener('touchstart', handleInput, { passive: false });
    canvas.addEventListener('touchend', e => e.preventDefault(), { passive: false });
    canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    
    // Mouse events for desktop
    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('click', handleInput);
    
    // Keyboard events
    window.addEventListener('keydown', e => {
      if([' ','ArrowUp'].includes(e.key)){ 
        handleInput(e);
      }
    });
    
    // Prevent context menu on long press
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    btnRestart.onclick = reset;

    function spawnPipe(){
      const gap = H * 0.235; // 160/680 ≈ 0.235 - proportional gap
      const minTop = H * 0.118; // 80/680 ≈ 0.118
      const maxTop = H - minTop - H * 0.324 - gap; // Proportional boundaries
      const top = minTop + Math.random() * maxTop;
      const width = W * 0.152; // 64/420 ≈ 0.152 - proportional width
      pipes.push({ x: W+10, w: width, top: top, bottom: top+gap, passed:false });
      // sometimes spawn a star in the gap
      if (Math.random() < 0.7){
        stars.push({ x: W+10 + width/2, y: top + gap/2, r: Math.min(W, H) * 0.024, taken:false });
      }
    }

    let backgroundX = 0;
    
    function drawBackground(){
      ctx.save();
      
      // Create animated castle background with CSS gradients until image loads
      if (!isReady(bgImg)) {
        // Gradient background with castle theme colors
        const gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#ff99cc'); // Light pink sky
        gradient.addColorStop(0.3, '#ffb6e9'); // Pink clouds
        gradient.addColorStop(0.7, '#ffc1f3'); // Pink hills  
        gradient.addColorStop(1, '#ffe0f7'); // Light pink ground
        
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);
        
        // Add some cloud-like shapes
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        for (let i = 0; i < 5; i++) {
          const x = (backgroundX + i * 150) % (W + 100);
          const y = H * 0.2 + Math.sin(backgroundX * 0.01 + i) * 20;
          ctx.beginPath();
          ctx.arc(x, y, 30, 0, Math.PI * 2);
          ctx.arc(x + 25, y, 35, 0, Math.PI * 2);
          ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
          ctx.fill();
        }
        
        backgroundX -= 0.5;
        if (backgroundX <= -150) backgroundX = 0;
        
        ctx.restore();
        return;
      }
      
      const scaleX = W/bgImg.width;
      const scaleY = H/bgImg.height;
      
      // Use the larger scale to ensure the image covers the entire canvas
      const scale = Math.max(scaleX, scaleY);
      const scaledWidth = bgImg.width * scale;
      const scaledHeight = bgImg.height * scale;
      
      ctx.globalAlpha = 0.25; // Very subtle background for better gameplay visibility
      
      // Smooth horizontal scrolling
      backgroundX -= 0.5; // Slow scroll speed
      
      // Draw background twice for seamless scrolling
      ctx.drawImage(bgImg, backgroundX, 0, scaledWidth, scaledHeight);
      ctx.drawImage(bgImg, backgroundX + scaledWidth, 0, scaledWidth, scaledHeight);
      
      // Reset position when first image is completely off-screen
      if (backgroundX <= -scaledWidth) {
        backgroundX = 0;
      }
      
      ctx.restore();
    }

    function drawHero(){
      if (!isReady(heroImg)) return;
      const size = hero.r * 2.5; // Proportional size based on collision radius
      
      ctx.save();
      
      // Calculate rotation based on vertical velocity
      // When falling (positive vy), rotate slightly downward
      // When jumping (negative vy), rotate slightly upward
      const maxRotation = Math.PI / 6; // 30 degrees max
      const rotation = Math.max(-maxRotation, Math.min(maxRotation, hero.vy * 0.15));
      
      // Translate to hero position and rotate
      ctx.translate(hero.x, hero.y);
      ctx.rotate(rotation);
      
      // Flash effect when hit
      if (heroFlashFrames > 0) {
        heroFlashFrames--;
        if (Math.floor(heroFlashFrames / 5) % 2 === 0) ctx.globalAlpha = 0.25;
      }

      // Draw hero centered at origin (since we translated)
      ctx.drawImage(heroImg, -size/2, -size/2, size, size);

      ctx.restore();
    }

    function drawPipeColumn(p){
      ctx.save();
      const shades = ['#ff80bf', '#ff4da6'];
      ctx.fillStyle = shades[ (Math.floor(p.x/40)%2+2)%2 ];
      // top rect
      roundRect(ctx, p.x, 0, p.w, p.top, 20);
      ctx.fill();
      // bottom rect
      roundRect(ctx, p.x, p.bottom, p.w, H - p.bottom, 20);
      ctx.fill();
      
      // stamp hearts centered vertically in each section
      if (isReady(heartImg)){
        const heartSize = 20;
        const heartCenterX = p.x + p.w / 2 - heartSize / 2;
        
        // Hearts in top section
        const topSectionHeight = p.top;
        const topHeartSpacing = Math.min(30, topSectionHeight / Math.floor(topSectionHeight / 30));
        const topStartY = (topSectionHeight % topHeartSpacing) / 2;
        
        for(let y = topStartY; y < p.top - heartSize; y += topHeartSpacing){
          if (y + heartSize <= p.top) {
            ctx.drawImage(heartImg, heartCenterX, y, heartSize, heartSize);
          }
        }
        
        // Hearts in bottom section  
        const bottomSectionHeight = H - p.bottom;
        const bottomHeartSpacing = Math.min(30, bottomSectionHeight / Math.floor(bottomSectionHeight / 30));
        const bottomStartY = p.bottom + (bottomSectionHeight % bottomHeartSpacing) / 2;
        
        for(let y = bottomStartY; y < H - heartSize; y += bottomHeartSpacing){
          if (y >= p.bottom && y + heartSize <= H) {
            ctx.drawImage(heartImg, heartCenterX, y, heartSize, heartSize);
          }
        }
      }
      ctx.restore();
    }

    function roundRect(ctx, x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r);
      ctx.arcTo(x,y,x+w,y,r);
      ctx.closePath();
    }

    function drawStar(s){
      const size = s.r * 2.5; // Proportional size based on radius
      
      // Draw yellow star shape
      ctx.save();
      ctx.fillStyle = '#FFD700'; // Gold/Yellow color
      ctx.strokeStyle = '#FFA500'; // Orange outline
      ctx.lineWidth = 2;
      
      // Draw star shape
      ctx.beginPath();
      const spikes = 5;
      const outerRadius = size / 2;
      const innerRadius = outerRadius * 0.4;
      
      for (let i = 0; i < spikes * 2; i++) {
        const angle = (i * Math.PI) / spikes - Math.PI / 2;
        const radius = i % 2 === 0 ? outerRadius : innerRadius;
        const x = s.x + Math.cos(angle) * radius;
        const y = s.y + Math.sin(angle) * radius;
        
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      
      // Add sparkle effect
      ctx.fillStyle = '#FFFF99'; // Light yellow
      ctx.beginPath();
      ctx.arc(s.x, s.y, size * 0.15, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }

    function physics(){
      if (gameOver || gameWon) return;

      // Only apply physics if game has started
      if (!gameStarted) {
        // Gentle floating animation while waiting
        hero.y = H * 0.294 + Math.sin(idleT * 0.04) * 8;
        hero.vy = 0;
        return;
      }

      // hero
      hero.vy += hero.g;
      if (hero.vy > 10) hero.vy = 10; // terminal velocity
      hero.y += hero.vy;
      
      // Ground and ceiling collision
      if (hero.y > H-hero.r){
        hero.y = H-hero.r;
        hero.vy = easyMode ? -3 : 0;
        if (!easyMode) { takeDamage(`¡Cuidado! Te quedan ${Math.floor(lives)} corazones`); }
        if (gameOver) return;
      }
      if (hero.y < hero.r){ hero.y = hero.r; hero.vy = 0; }

      // spawn pipes with progressive difficulty
      pipeTimer++;
      const spawnInterval = Math.max(65, 95 - Math.floor(score / 5) * 5);
      if (pipeTimer >= spawnInterval) { spawnPipe(); pipeTimer = 0; }

      // move pipes with progressive speed
      const pipeSpeed = Math.min(2.4 + score * 0.05, 4.5);
      for(const p of pipes){ p.x -= pipeSpeed; }
      if (pipes.length && pipes[0].x + pipes[0].w < -10) pipes.shift();

      // move stars
      for(const s of stars){ s.x -= pipeSpeed; }
      if (stars.length && stars[0].x < -20) stars.shift();

      // collisions & scoring
      for(const p of pipes){
        if (!p.passed && p.x + p.w < hero.x){ 
          p.passed = true; 
          score++; 
          best = Math.max(best, score); 
          
          // Check for victory condition at 50 points
          if (score >= 50) {
            gameWon = true;
            playVictory();
            message("🌈 ¡GANASTE! ¡50 PUNTOS! ¡ERES INCREÍBLE! 🌈");
            
            // Add massive confetti explosion
            for (let i=0;i<100;i++){
              particles.push({
                x: Math.random()*W, 
                y: Math.random()*H, 
                vx:(Math.random()-0.5)*8, 
                vy:-Math.random()*6-2, 
                life:120, 
                color: `hsl(${Math.random()*360}, 100%, ${50 + Math.random()*30}%)`,
                size: Math.random() * 8 + 4,
                type: Math.random() < 0.3 ? 'circle' : 'square'
              });
            }
            
            // Add sparkle confetti
            for (let i=0;i<50;i++){
              particles.push({
                x: Math.random()*W, 
                y: Math.random()*H, 
                vx:(Math.random()-0.5)*6, 
                vy:-Math.random()*4-1, 
                life:100, 
                color: '#FFD700',
                size: Math.random() * 4 + 2,
                type: 'star'
              });
            }
            return;
          }
          
          message(` ¡Genial! Puntos: ${score}/50 - Estrellas: ${starPoints}`); 
        }
        const withinX = hero.x > p.x-hero.r+4 && hero.x < p.x + p.w + hero.r-4;
        const hitsTop = hero.y-hero.r+4 < p.top && withinX;
        const hitsBottom = hero.y+hero.r-4 > p.bottom && withinX;
        if ((hitsTop || hitsBottom) && !p.hit){
          p.hit = true;
          if (easyMode) {
            gentleBump();
          } else {
            hero.vy = -5;
            takeDamage(`¡Auch! Te quedan ${Math.floor(lives)} corazones`);
            if (gameOver) return;
          }
        }
      }

      // Star collection - more generous collision area
      for(const s of stars){
        if (!s.taken && Math.hypot(hero.x - s.x, hero.y - s.y) < hero.r + 12){
          s.taken = true;
        }
      }
      let kept = [];
      for(const s of stars){
        if (s.taken){
          starPoints += 1;
          playStar();
          
          // Victory condition moved to score section
          
          message(` ¡Brillas! Estrellas: ${starPoints}`);
          for (let i=0;i<5;i++){
            particles.push({x:s.x, y:s.y, vx:(Math.random()-0.5)*2, vy:-Math.random()*2-1, life:40, color: '#FFD700'});
          }
        } else kept.push(s);
      }
      stars = kept;

      // Tick down invincibility
      if (invincibleFrames > 0) invincibleFrames--;
    }

    function gentleBump(){
      hero.vy = -5;
      message(" ¡No pasa nada! ¡Inténtalo otra vez, tú puedes!");
    }

    function takeDamage(msg_text) {
      if (invincibleFrames > 0) return;
      lives -= 0.5;
      updateHeartsDisplay();
      playHurt();
      heroFlashFrames = 40;
      invincibleFrames = 90;
      if (lives <= 0) {
        gameOver = true;
        message("¡Se acabaron los corazones! Juego terminado");
      } else {
        message(msg_text);
      }
    }

    // particles
    let particles = [];
    function drawParticles(){
      ctx.save();
      particles = particles.filter(p => --p.life > 0);
      for(const p of particles){
        p.x += p.vx; 
        p.y += p.vy;
        p.vy += 0.1; // Add slight gravity to particles
        
        const maxLife = p.size ? 120 : (p.color ? 80 : 40);
        ctx.globalAlpha = Math.max(0, p.life/maxLife);
        
        if (p.color) {
          ctx.fillStyle = p.color;
          const size = p.size || 3;
          
          if (p.type === 'star' || p.color === '#FFD700') {
            // Star particles
            ctx.beginPath();
            const spikes = 5;
            const outerRadius = size;
            const innerRadius = size * 0.5;
            
            for (let i = 0; i < spikes * 2; i++) {
              const angle = (i * Math.PI) / spikes;
              const radius = i % 2 === 0 ? outerRadius : innerRadius;
              const x = p.x + Math.cos(angle) * radius;
              const y = p.y + Math.sin(angle) * radius;
              
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
          } else if (p.type === 'circle') {
            // Circle confetti
            ctx.beginPath();
            ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
            ctx.fill();
          } else {
            // Square confetti (default)
            const halfSize = size / 2;
            ctx.fillRect(p.x - halfSize, p.y - halfSize, size, size);
          }
        } else if (isReady(sparkleImg)) {
          // Regular sparkle particles
          ctx.drawImage(sparkleImg, p.x-10, p.y-10, 20, 20);
        }
      }
      ctx.restore();
    }

    function drawVictoryScreen(){
      if (!gameWon) return;
      
      ctx.save();
      
      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(255, 182, 233, 0.95)';
      ctx.fillRect(0, 0, W, H);
      
      // Draw large hero image in center
      if (isReady(heroImg)) {
        const heroSize = Math.min(W, H) * 0.4;
        const heroX = W / 2 - heroSize / 2;
        const heroY = H / 2 - heroSize / 2 - 50;
        
        // Add glow effect around hero
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 30;
        ctx.drawImage(heroImg, heroX, heroY, heroSize, heroSize);
        ctx.shadowBlur = 0;
      }
      
      // Victory text
      ctx.textAlign = 'center';
      ctx.fillStyle = '#e60073';
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      
      const titleSize = Math.min(W, H) * 0.08;
      ctx.font = `bold ${titleSize}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
      ctx.strokeText('¡GANASTE!', W/2, H/2 + 100);
      ctx.fillText('¡GANASTE!', W/2, H/2 + 100);
      
      const subtitleSize = Math.min(W, H) * 0.04;
      ctx.font = `bold ${subtitleSize}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
      ctx.strokeText('¡50 PUNTOS! ¡ERES INCREÍBLE!', W/2, H/2 + 140);
      ctx.fillText('¡50 PUNTOS! ¡ERES INCREÍBLE!', W/2, H/2 + 140);
      
      ctx.fillText('🌈✨ ¡FELICIDADES! ✨🌈', W/2, H/2 + 180);
      
      // Reset text alignment
      ctx.textAlign = 'left';
      ctx.restore();
    }

    function drawHUD(){
      ctx.save();
      ctx.fillStyle = '#e60073';
      const baseFontSize = Math.min(W, H) * 0.04; // Slightly smaller font
      const smallFontSize = Math.min(W, H) * 0.032;
      const topPosition = H * 0.08; // Top position
      const rightMargin = W * 0.95; // Right side positioning
      
      // Set text alignment to right
      ctx.textAlign = 'right';
      
      ctx.font = `bold ${baseFontSize}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
      ctx.fillText('Puntos: ' + score + '/50', rightMargin, topPosition);
      ctx.font = `bold ${smallFontSize}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
      ctx.fillText('Estrellas: ' + starPoints, rightMargin, topPosition + baseFontSize * 1.3);
      ctx.fillText('Mejor: ' + best, rightMargin, topPosition + baseFontSize * 2.6);
      
      // Reset text alignment
      ctx.textAlign = 'left';
      ctx.restore();
    }

    function frame(){
      idleT++;
      // Only increment time when game has started
      if (gameStarted) {
        t++;
      }
      physics();

      ctx.clearRect(0,0,W,H);
      drawBackground();
      for(const p of pipes){ drawPipeColumn(p); }
      for(const s of stars){ drawStar(s); }
      drawHero();
      drawParticles();
      drawHUD();
      
      // Draw victory screen on top of everything
      drawVictoryScreen();

      requestAnimationFrame(frame);
    }

    initHero(); // Initialize hero position and size
    reset();
    requestAnimationFrame(frame);
</script>
<audio id="starSound" src="assets/star.wav" preload="auto"></audio>
</body>
</html>
